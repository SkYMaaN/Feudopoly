<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Feudopoly</title>
        <style>
            /* Reset CSS: Please avoid making changes here unless you know what you're doing :) */
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
    
            html, body {
                width: 100%;
                height: 100%;
            }
    
            body {
                line-height: 1;
                font-family: Arial, sans-serif;
                background-color: #9CBFD9;
            }

            @property --nickname-border-angle {
                syntax: '<angle>';
                inherits: false;
                initial-value: 0deg;
            }

            .start-scene-input-shell {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 4px;
                border-radius: 16px;
                --nickname-border-angle: 0deg;
                background: #2b5e8a;
                transition: box-shadow 0.2s ease, background 0.2s ease;
            }

            .start-scene-input-shell.is-empty {
                background: conic-gradient(
                    from var(--nickname-border-angle),
                    #ff4d4d,
                    #ffd166,
                    #5fd6ff,
                    #ff4d4d
                );
                animation: nickname-border-spin 1.8s linear infinite;
                box-shadow: 0 0 18px rgba(255, 77, 77, 0.35);
            }

            .start-scene-input-shell.is-focused {
                background: #214c74;
                box-shadow: 0 0 0 3px rgba(33, 76, 116, 0.16);
                animation: none;
            }

            .start-scene-input-inner {
                display: flex;
                align-items: center;
                width: 100%;
                height: 100%;
                padding: 0 12px;
                border-radius: 13px;
                background: #ffffff;
            }

            .start-scene-input {
                width: 100%;
                height: 100%;
                border: 0;
                outline: none;
                background: transparent;
                color: #1d3557;
                font-family: Arial, sans-serif;
                font-size: 30px;
                text-align: left;
            }

            .start-scene-input::placeholder {
                color: rgba(29, 53, 87, 0.55);
            }

            @keyframes nickname-border-spin {
                from {
                    --nickname-border-angle: 0deg;
                }

                to {
                    --nickname-border-angle: 360deg;
                }
            }
    
            ol, ul {
                list-style: none;
            }
    
            img, video {
                max-width: 100%;
                height: auto;
                display: block;
            }
    
            a {
                text-decoration: none;
                color: inherit;
            }
        </style>
    </head>
    <body>
        <div id="game-container"></div>
        <script src="./phaser.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
        <script type="module" src="./src/main.js"></script>
    </body>
    </html>
